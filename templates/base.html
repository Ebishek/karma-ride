<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KarmaRide MVP</title>
    
    <!-- Tailwind CSS (CDN for MVP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="antialiased min-h-screen pb-20">
    
    <!-- Top Navigation -->
    <header class="glass sticky top-0 z-50 p-4 border-b border-white/10 flex justify-between items-center shadow-lg">
        <div class="text-2xl font-bold tracking-tighter">
            Karma<span class="karma-gradient">Ride</span>
        </div>
        <div class="flex items-center space-x-3 bg-white/10 px-3 py-1 rounded-full">
            <span class="text-emerald-400 font-semibold text-lg">💎 {{ user.karma_balance }}</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="p-4 max-w-md mx-auto fade-in">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Mobile Navigation -->
    <nav class="glass fixed bottom-0 w-full z-50 border-t border-white/10 safe-area-pb">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto">
            <a href="/" class="flex flex-col items-center text-gray-400 hover:text-emerald-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-xs mt-1">Profile</span>
            </a>
            <a href="/find" class="flex flex-col items-center text-gray-400 hover:text-emerald-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-xs mt-1">Seek Ride</span>
            </a>
            <a href="/offer" class="flex flex-col items-center text-gray-400 hover:text-emerald-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-xs mt-1">Offer Ride</span>
            </a>
        </div>
    </nav>
    
    <!-- Leaflet JS for Maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
