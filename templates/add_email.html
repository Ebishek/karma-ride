{% extends "base.html" %}

{% block content %}
<main class="flex-1 px-margin-mobile md:px-margin-desktop pb-24 md:pb-16 flex flex-col justify-center items-center w-full max-w-lg mx-auto relative z-20 mt-8 min-h-[70vh]">
    <div class="text-center mb-8">
        <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">{{ t('Email Required') }}</h1>
        <p class="font-body-md text-on-surface-variant">{{ t('We recently updated our system to make accounts more secure. Please provide an email address to continue using KarmaRide.') }}</p>
    </div>

    <form action="/add-email" method="POST" class="w-full bg-surface-container rounded-2xl p-6 md:p-8 shadow-[0_4px_12px_rgba(75,61,51,0.08)] border border-outline-variant/30 space-y-5">
        {% if error %}
        <div class="bg-error-container text-on-error-container p-4 rounded-xl text-center text-sm font-label-md border border-error-container">
            {{ error }}
        </div>
        {% endif %}

        <div>
            <label class="block font-label-md text-on-surface mb-1">{{ t('Email Address') }}</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">email</span>
                <input type="email" name="email" required class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface placeholder-on-surface-variant transition-colors shadow-sm" placeholder="{{ t('Enter your email address') }}">
            </div>
        </div>

        <button type="submit" class="w-full bg-primary text-on-primary font-label-md text-lg py-4 rounded-xl shadow-md hover:bg-primary/90 transition-colors mt-6">
            {{ t('Save and Continue') }}
        </button>

        <p class="text-center text-on-surface-variant text-sm mt-6 font-body-md">
            <a href="/logout" class="text-primary font-bold hover:underline">{{ t('Logout') }}</a>
        </p>
    </form>
</main>
{% endblock %}
