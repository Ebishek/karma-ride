{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
        <p class="text-gray-400 text-sm">Join the community. Earn <span class="text-emerald-400 font-bold">50 Karma 💎</span> instantly!</p>
    </div>

    <form action="/register" method="POST" class="glass rounded-3xl p-6 space-y-5">
        {% if error %}
        <div class="bg-red-500/20 border border-red-500/50 text-red-400 p-3 rounded-xl text-center text-sm font-semibold">
            {{ error }}
        </div>
        {% endif %}

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">👤</span>
                <input type="text" name="name" required class="w-full bg-black/50 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="e.g. Alex Helper">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Phone Number</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">📱</span>
                <input type="tel" name="phone" required class="w-full bg-black/50 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="Enter your phone">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">🔒</span>
                <input type="password" name="password" required class="w-full bg-black/50 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="Create a password">
            </div>
        </div>

        <button type="submit" class="w-full btn-primary text-white font-bold rounded-xl py-4 mt-6 shadow-lg text-lg">
            Create Account
        </button>

        <p class="text-center text-gray-400 text-sm mt-6">
            Already have an account? <a href="/login" class="text-emerald-400 font-bold hover:underline">Sign In</a>
        </p>
    </form>
</div>
{% endblock %}
