{% extends "base.html" %}

{% block content %}
<main class="flex-1 px-margin-mobile md:px-margin-desktop pb-24 md:pb-16 flex flex-col gap-6 w-full max-w-3xl mx-auto relative z-20 mt-8">
    <div class="mb-2">
        <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Offer a Ride</h1>
        <p class="font-body-md text-on-surface-variant">Help the community and earn Karma points.</p>
    </div>

    <form action="/api/rides" method="POST" class="bg-surface-container rounded-2xl p-6 md:p-8 shadow-[0_4px_12px_rgba(75,61,51,0.08)] border border-outline-variant/30 space-y-6">
        
        <!-- Map Container -->
        <div class="w-full h-48 bg-surface-variant rounded-xl overflow-hidden relative border border-outline-variant/50" id="map">
            <!-- Leaflet map injects here -->
        </div>
        
        <!-- Form Fields -->
        <div class="space-y-4">
            <div>
                <label class="block font-label-md text-on-surface mb-1">Source location</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">location_on</span>
                    <input type="text" name="source" required class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface placeholder-on-surface-variant transition-colors shadow-sm" placeholder="e.g. Community Center">
                </div>
            </div>
            
            <div>
                <label class="block font-label-md text-on-surface mb-1">Destination</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary">flag</span>
                    <input type="text" name="destination" required class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface placeholder-on-surface-variant transition-colors shadow-sm" placeholder="e.g. Market Square">
                </div>
            </div>

            <div>
                <label class="block font-label-md text-on-surface mb-1">Departure Time</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">schedule</span>
                    <input type="datetime-local" name="date_time_str" required class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface transition-colors shadow-sm">
                </div>
            </div>
        </div>
        
        <!-- Karma Reward -->
        <div class="bg-secondary-fixed rounded-xl p-4 flex items-center justify-between border border-secondary-container/30 shadow-[0_2px_8px_rgba(123,88,0,0.1)]">
            <div>
                <p class="font-headline-md text-lg text-on-secondary-fixed">Karma Reward</p>
                <p class="font-body-sm text-on-secondary-fixed-variant text-sm">Points earned on completion</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-on-secondary-fixed text-2xl" style="font-variation-settings: 'FILL' 1;">spa</span>
                <input type="number" name="karma_reward" value="15" min="1" class="w-20 bg-surface-container-lowest border-2 border-secondary-container rounded-lg py-2 px-3 text-on-surface text-center font-bold focus:outline-none focus:border-primary shadow-sm text-lg">
            </div>
        </div>

        <button type="submit" class="w-full bg-on-secondary-fixed-variant text-on-secondary font-label-md text-lg py-4 rounded-xl shadow-md hover:bg-on-secondary-fixed-variant/90 transition-colors flex justify-center items-center gap-2 mt-4">
            <span>Post Ride</span>
            <span class="material-symbols-outlined">send</span>
        </button>
    </form>
</main>
{% endblock %}

{% block scripts %}
<script>
    // Map Base Layers
    const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
    });
    const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
    });
    const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    });

    // Initialize Leaflet map
    var map = L.map('map', {
        center: [28.6139, 77.2090], // Default location
        zoom: 13,
        layers: [cartoLight] // Switch to Light Mode by default for the Gramin theme
    }); 

    // Add Layer Control widget to top right
    const baseMaps = {
        "Light Mode": cartoLight,
        "Dark Mode": cartoDark,
        "Street View": osmStandard
    };
    L.control.layers(baseMaps).addTo(map);

    // Set default departure time to current local time
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.querySelector('input[name="date_time_str"]').value = now.toISOString().slice(0,16);

    // Map Interaction Logic
    let sourceMarker = null;
    let destMarker = null;
    const sourceInput = document.querySelector('input[name="source"]');
    const destInput = document.querySelector('input[name="destination"]');

    // Try to get user's live location
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(async function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            map.setView([lat, lng], 14);
            
            // Automatically set the source pin to the user's current location
            if (!sourceMarker) {
                sourceMarker = L.marker([lat, lng]).addTo(map).bindPopup("Your Location (Source)").openPopup();
                sourceInput.value = "Fetching address...";
                const address = await reverseGeocode(lat, lng);
                sourceInput.value = address;
            }
        });
    }

    async function reverseGeocode(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
            const data = await response.json();
            return data.display_name.split(',').slice(0, 3).join(', '); // Return a shortened readable address
        } catch (error) {
            return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; // Fallback to coordinates
        }
    }

    map.on('click', async function(e) {
        if (!sourceMarker) {
            // First click: Set Source
            sourceMarker = L.marker(e.latlng).addTo(map).bindPopup("Source").openPopup();
            sourceInput.value = "Fetching address...";
            const address = await reverseGeocode(e.latlng.lat, e.latlng.lng);
            sourceInput.value = address;
        } else if (!destMarker) {
            // Second click: Set Destination
            destMarker = L.marker(e.latlng).addTo(map).bindPopup("Destination").openPopup();
            destInput.value = "Fetching address...";
            const address = await reverseGeocode(e.latlng.lat, e.latlng.lng);
            destInput.value = address;
            
            // Draw a simple line between them
            L.polyline([sourceMarker.getLatLng(), destMarker.getLatLng()], {color: '#a03f28', weight: 4, dashArray: '5, 10'}).addTo(map);
            map.fitBounds([sourceMarker.getLatLng(), destMarker.getLatLng()], {padding: [30, 30]});
        } else {
            // Reset if clicked a third time
            map.eachLayer((layer) => {
                if (layer instanceof L.Marker || layer instanceof L.Polyline) {
                    map.removeLayer(layer);
                }
            });
            sourceMarker = null;
            destMarker = null;
            sourceInput.value = "";
            destInput.value = "";
        }
    });
</script>
{% endblock %}
