{% extends "base.html" %}

{% block content %}
<main class="flex-1 px-margin-mobile md:px-margin-desktop pb-24 md:pb-16 flex flex-col justify-center items-center w-full max-w-lg mx-auto relative z-20 mt-8 min-h-[70vh]">
    <div class="text-center mb-8">
        <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">{{ t('Reset Password') }}</h1>
        <p class="font-body-md text-on-surface-variant">{{ t('Enter the 4-digit code sent to your email and your new password.') }}</p>
    </div>

    <form action="/reset-password" method="POST" class="w-full bg-surface-container rounded-2xl p-6 md:p-8 shadow-[0_4px_12px_rgba(75,61,51,0.08)] border border-outline-variant/30 space-y-5">
        {% if error %}
        <div class="bg-error-container text-on-error-container p-4 rounded-xl text-center text-sm font-label-md border border-error-container">
            {{ error }}
        </div>
        {% endif %}

        <div>
            <label class="block font-label-md text-on-surface mb-1">{{ t('Reset Code (OTP)') }}</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">pin</span>
                <input type="text" name="otp" required maxlength="4" class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface placeholder-on-surface-variant transition-colors shadow-sm tracking-[0.5em]" placeholder="0000">
            </div>
        </div>

        <div>
            <label class="block font-label-md text-on-surface mb-1">{{ t('New Password') }}</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">lock</span>
                <input type="password" name="new_password" required minlength="6" class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl py-3 pl-10 pr-4 font-body-md text-on-surface placeholder-on-surface-variant transition-colors shadow-sm" placeholder="{{ t('Enter new password') }}">
            </div>
        </div>

        <button type="submit" class="w-full bg-primary text-on-primary font-label-md text-lg py-4 rounded-xl shadow-md hover:bg-primary/90 transition-colors mt-6">
            {{ t('Reset Password') }}
        </button>

        <p class="text-center text-on-surface-variant text-sm mt-6 font-body-md">
            <a href="/login" class="text-primary font-bold hover:underline">{{ t('Back to Login') }}</a>
        </p>
    </form>
</main>
{% endblock %}
