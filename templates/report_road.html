{% extends "base.html" %}

{% block content %}
<main class="flex-grow pt-24 pb-12 px-margin-mobile md:px-margin-desktop bg-surface relative z-10 w-full min-h-screen">
    <div class="max-w-xl mx-auto">
        
        <div class="mb-8">
            <a href="/dashboard" class="inline-flex items-center gap-2 text-primary hover:bg-surface-variant/50 px-3 py-2 rounded-lg transition-colors -ml-3">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-label-lg">{{ t('Back to Dashboard') }}</span>
            </a>
            <h1 class="font-display-sm text-on-background mt-4">Report Road Condition</h1>
            <p class="font-body-lg text-on-surface-variant mt-2">{{ t('Help the community by reporting roadblocks, construction, or hazards.') }}</p>
        </div>

        <div class="bg-surface-container rounded-3xl p-6 md:p-8 shadow-lg border border-outline-variant/30">
            <form id="reportForm" action="/api/road-updates" method="POST" enctype="multipart/form-data" class="flex flex-col gap-6">
                
                <!-- Issue Type -->
                <div>
                    <label class="block font-label-lg text-on-surface mb-3">{{ t('Type of Issue') }}</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Landslide" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-error peer-checked:text-white peer-checked:border-error transition-colors font-body-md shadow-sm">
                                ⛰️ {{ t('Landslide') }}
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Severe Weather" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors font-body-md shadow-sm">
                                ⛈️ {{ t('Severe Weather') }}
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Forest Fire" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-error peer-checked:text-white peer-checked:border-error transition-colors font-body-md shadow-sm">
                                🔥 {{ t('Forest Fire') }}
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Black Ice" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-secondary peer-checked:text-white peer-checked:border-secondary transition-colors font-body-md shadow-sm">
                                ❄️ {{ t('Black Ice') }}
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Construction" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-tertiary peer-checked:text-white peer-checked:border-tertiary transition-colors font-body-md shadow-sm">
                                🚧 {{ t('Construction') }}
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="issue_type" value="Other" class="peer hidden" required>
                            <div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface peer-checked:bg-on-surface-variant peer-checked:text-white peer-checked:border-on-surface-variant transition-colors font-body-md shadow-sm">
                                ⚠️ {{ t('Other') }}
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Location -->
                <div>
                    <label for="location" class="block font-label-lg text-on-surface mb-2">{{ t('Location (e.g. Village Name, Landmark)') }}</label>
                    <input type="text" id="location" name="location" required 
                           class="w-full bg-surface rounded-xl px-4 py-3 text-on-surface font-body-lg border border-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-on-surface-variant/50" 
                           placeholder="{{ t('e.g. Main road near Bhatwari') }}">
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block font-label-lg text-on-surface mb-2">{{ t('Details of the issue') }}</label>
                    <textarea id="description" name="description" required rows="4"
                              class="w-full bg-surface rounded-xl px-4 py-3 text-on-surface font-body-lg border border-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-on-surface-variant/50 resize-none" 
                              placeholder="{{ t('Describe the roadblock or condition...') }}"></textarea>
                </div>

                <!-- Image Upload -->
                <div>
                    <label class="block font-label-lg text-on-surface mb-2">{{ t('Attach Photographic Proof (Optional)') }}</label>
                    
                    <div class="relative group mt-1">
                        <label for="image" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-outline-variant hover:border-primary rounded-xl cursor-pointer bg-surface hover:bg-surface-variant/30 transition-colors overflow-hidden">
                            
                            <div id="image-preview-container" class="absolute inset-0 w-full h-full hidden">
                                <img id="image-preview" src="" alt="Preview" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="text-white font-label-md flex items-center gap-2">
                                        <span class="material-symbols-outlined">edit</span>{{ t(' Change Image') }}
                                    </span>
                                </div>
                            </div>

                            <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6 text-on-surface-variant">
                                <span class="material-symbols-outlined text-[32px] text-primary/70 mb-2">add_a_photo</span>
                                <p class="mb-1 font-body-md text-center"><span class="font-bold">{{ t('Click to upload') }}</span>{{ t(' or take a photo') }}</p>
                                <p class="text-xs text-center opacity-70">JPEG, PNG, JPG (Max 5MB)</p>
                            </div>

                            <input id="image" name="image" type="file" class="hidden" accept="image/*" capture="environment" />
                        </label>
                    </div>
                </div>

                <div class="pt-4 border-t border-outline-variant/30 mt-2">
                    <button type="submit" class="w-full bg-primary text-on-primary font-label-lg py-4 rounded-xl shadow-md hover:scale-[0.98] transition-transform duration-150 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">campaign</span>
                        {{ t('Broadcast to Village') }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<script>
    // Handle image preview and compression
    const imageInput = document.getElementById('image');
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const uploadPlaceholder = document.getElementById('upload-placeholder');

    imageInput.addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024;
                    const MAX_HEIGHT = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Show preview using compressed image
                    imagePreview.src = canvas.toDataURL('image/jpeg', 0.8);
                    imagePreviewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');

                    // Replace the original file with the compressed one
                    canvas.toBlob(function(blob) {
                        const compressedFile = new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(compressedFile);
                        imageInput.files = dataTransfer.files;
                    }, 'image/jpeg', 0.8);
                };
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        } else {
            imagePreview.src = "";
            imagePreviewContainer.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
        }
    });

    document.getElementById('reportForm').addEventListener('submit', function() {
        const btn = this.querySelector('button[type="submit"]');
        if (btn) {
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="animation: spin 1s linear infinite;">sync</span> {{ t("Processing...") }}';
        }
    });
</script>
<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
